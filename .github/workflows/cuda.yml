name: CUDA CI [Compilation only]
on: [push]
env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: RelWithDebInfo

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.3.0-devel-ubuntu24.04

    steps:
    - name: Install git in container 
      run: |
        apt-get update
        apt-get install -y git
    - uses: actions/checkout@v4
      with:
        persist-credentials: false 
    - uses: actions/setup-node@v4
    - name: Get Yaml Lcov and MPICH
      run: apt install libyaml-cpp-dev lcov mpich

    - name: Install recent CMake (Kitware apt repo)
      run: |
        apt-get install -y wget gpg
        wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc \
          | gpg --dearmor - | tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
        echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main" \
          | tee /etc/apt/sources.list.d/kitware.list
        apt-get update
        apt-get install -y cmake
        cmake --version

    - name: Locate nvcc
      id: nvcc
      run: |
        command -v nvcc
        echo "path=$(command -v nvcc)" >> "$GITHUB_OUTPUT"
        
    - name: Get Onika
      run: git clone --depth 1 https://github.com/Collab4exaNBody/onika.git        

    - name: Configure Onika (CUDA enabled, target sm_${{env.CUDA_ARCH}})
      run: |
        cmake -B ${{github.workspace}}/onika/build-cuda \
              -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
              -DCMAKE_INSTALL_PREFIX=${{github.workspace}}/onika/install-cuda \
              -DONIKA_BUILD_CUDA=ON \
              -DCMAKE_CUDA_COMPILER=${{steps.nvcc.outputs.path}} \
              -DCMAKE_CUDA_ARCHITECTURES=${{env.CUDA_ARCH}}
      working-directory: ${{github.workspace}}/onika

    - name: Build Onika
      run: cmake --build ${{github.workspace}}/onika/build-cuda --target install --config ${{env.BUILD_TYPE}} -j 4
 
    - name: Configure CMake
      run: cmake -DCMAKE_CXX_FLAGS="--coverage -g" -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -Donika_DIR=${{github.workspace}}/onika/install-cuda 

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j 2  
